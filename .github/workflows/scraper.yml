name: Parijs-Roubaix Auto Scraper

on:
  schedule:
    - cron: "*/5 5-18 12 4 *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip outside race day
        id: raceday
        run: |
          TODAY_UTC="$(date -u +%Y-%m-%d)"
          if [ "$TODAY_UTC" != "2026-04-12" ]; then
            echo "run_scraper=false" >> "$GITHUB_OUTPUT"
            echo "Niet op racedag (UTC: $TODAY_UTC), scraper wordt overgeslagen."
            exit 0
          fi
          echo "run_scraper=true" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.raceday.outputs.run_scraper == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.raceday.outputs.run_scraper == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run scraper
        if: steps.raceday.outputs.run_scraper == 'true'
        run: python scraper.py

      - name: Commit standings update
        if: steps.raceday.outputs.run_scraper == 'true'
        run: |
          if git diff --quiet -- data/standings.json; then
            echo "Geen wijzigingen in data/standings.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/standings.json
          git commit -m "Update standings data (auto)"
          git push
